name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}

    env:
      REGION: us-east-1
      ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      REPOSITORY_NAME: sales-intelligence
      SERVICE: sales-intelligence-api
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify AWS Authentication
        run: |
          aws sts get-caller-identity

      - name: Create ECR Repository
        run: |
          aws ecr describe-repositories --repository-names "${{ env.REPOSITORY_NAME }}" --region "${{ env.REGION }}" 2>/dev/null || \
          aws ecr create-repository \
            --repository-name "${{ env.REPOSITORY_NAME }}" \
            --region "${{ env.REGION }}"

      - name: Build Container
        run: |
          docker build \
            --tag "${{ steps.login-ecr.outputs.registry }}/${{ env.REPOSITORY_NAME }}:${GITHUB_SHA}" \
            --tag "${{ steps.login-ecr.outputs.registry }}/${{ env.REPOSITORY_NAME }}:${ENVIRONMENT}" \
            .

      - name: Push Container
        run: |
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.REPOSITORY_NAME }}:${GITHUB_SHA}"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.REPOSITORY_NAME }}:${ENVIRONMENT}"

      - name: Configure Container Security
        run: |
          echo "Vulnerability scanning configuration for AWS ECR"
          aws ecr describe-image-vulnerabilities \
            --repository-name "${{ env.REPOSITORY_NAME }}" \
            --image-id imageTag="${GITHUB_SHA}" \
            --region "${{ env.REGION }}"

      - name: Create ECS Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://task-definition.json

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster "${ENVIRONMENT}-cluster" \
            --service "${SERVICE}" \
            --task-definition "${SERVICE}:$(date +%Y%m%d%H%M%S)" \
            --region "${{ env.REGION }}"

      - name: Configure ECS Permissions
        run: |
          if [ "${ENVIRONMENT}" != "production" ]; then
            aws iam put-role-policy \
              --role-name sales-intelligence-${ENVIRONMENT} \
              --policy-name ecs-access \
              --policy-document file://ecs-policy.json
          fi

      - name: Configure Environment Secrets
        run: |
          aws secretsmanager create-secret \
            --name "sales-intelligence/${ENVIRONMENT}/GEMINI_API_KEY" \
            --secret-string "${{ secrets.GEMINI_API_KEY }}" \
            --region "${{ env.REGION }}"

          aws secretsmanager create-secret \
            --name "sales-intelligence/${ENVIRONMENT}/FIREBASE_PRIVATE_KEY" \
            --description "Firebase Private Key for ${ENVIRONMENT}" \
            --secret-string "${{ secrets.FIREBASE_PRIVATE_KEY }}" \
            --region "${{ env.REGION }}"

          aws secretsmanager create-secret \
            --name "sales-intelligence/${ENVIRONMENT}/FIREBASE_CLIENT_EMAIL" \
            --description "Firebase Client Email for ${ENVIRONMENT}" \
            --secret-string "${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
            --region "${{ env.REGION }}"

      - name: Set Environment Variables in ECS
        run: |
          aws ecs update-service \
            --cluster "${ENVIRONMENT}-cluster" \
            --service "${SERVICE}" \
            --region "${{ env.REGION }}" \
            --force-new-deployment \
            --enable-execute-command

      - name: Create CloudFront Distribution
        run: |
          if [ "${ENVIRONMENT}" = "production" ]; then
            aws cloudfront create-distribution \
              --distribution-config file://cloudfront-config.json
          fi

      - name: Generate CloudFront URL
        run: |
          if [ "${ENVIRONMENT}" = "production" ]; then
            RESPONSE=$(aws cloudfront get-distribution-id --query 'Distribution.Id' --output text --region "${{ env.REGION }}")
            echo "SERVICE_URL=https://${RESPONSE}.cloudfront.net" >> $GITHUB_ENV
            echo "PRODUCTION_SERVICE_URL=https://${RESPONSE}.cloudfront.net" >> $GITHUB_ENV
          fi

      - name: Configure Auto Scaling
        run: |
          if [ "${ENVIRONMENT}" = "staging" ]; then
            aws autoscaling create-lifecycle-hook \
              --lifecycle-hook-name '${ENVIRONMENT}-scale-up' \
              --auto-scaling-group-name "${ENVIRONMENT}-asg" \
              --heartbeat-timeout 900
          fi

      - name: Create Security Groups
        run: |
          aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=sales-intelligence-${ENVIRONMENT}-sg" \
            --query "SecurityGroups[0].GroupId" \
            --output text

      - name: Configure MSI (IAM Role) for CI/CD
        run: |
          aws iam create-service-linked-role \
            --aws-service-name ecs.amazonaws.com \
            --description "Service-linked role for ECS"

      - name: Deploy to Load Balancer
        run: |
          if [ "${ENVIRONMENT}" = "production" ]; then
            aws elbv2 create-load-balancer \
              --name "${SERVICE}-alb-${ENVIRONMENT}" \
              --subnet-mappings "$(aws ec2 describe-subnets --filters Name:tags:Name,Values=${ENVIRONMENT}-public --query 'Subnets[].{SubnetId=SubnetId,PrivateIp=PrivateIpAddress}' --output json)"

            aws elbv2 create-target-group \
              --name "${SERVICE}-tg-${ENVIRONMENT}" \
              --protocol HTTP \
              --port 80

            aws elbv2 register-targets \
              --target-group-arn "$(aws elbv2 describe-target-groups --names "${SERVICE}-tg-${ENVIRONMENT}" --query 'TargetGroups[0].TargetGroupArn' --output text)" \
              --targets "Id=$(${AWS_ECS_TASK_ID})"

            aws elbv2 create-listener \
              --default-actions Type=forward,TargetGroupArn="$(aws elbv2 describe-target-groups --names "${SERVICE}-tg-${ENVIRONMENT}" --query 'TargetGroups[0].TargetGroupArn' --output text)"
          fi

      - name: Enable CloudWatch Monitoring
        run: |
          aws cloudwatch put-metric-alarm \
            --alarm-name "${SERVICE}-cpu-high-${ENVIRONMENT}" \
            --alarm-description "CPU usage alert" \
            --metric-name CPUUtilization \
            --namespace AWS/ECS \
            --statistic Average \
            --period 300 \
            --threshold 80 \
            --comparison-operator GreaterThanThreshold \
            --dimension Name=ServiceName,Value="${SERVICE}" \
            --region "${{ env.REGION }}"

      - name: List ECS Services
        run: |
          aws ecs list-services \
            --cluster "${ENVIRONMENT}-cluster" \
            --region "${{ env.REGION }}"

      - name: Get Task Instances
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "${ENVIRONMENT}-cluster" \
            --service "${SERVICE}" \
            --region "${{ env.REGION }}" \
            --query 'taskArns[0]' \
            --output text)
          echo "TASK_ARN=${TASK_ARN}" >> $GITHUB_ENV

      - name: Execute ECS Command
        run: |
          aws ecs execute-command \
            --cluster "${ENVIRONMENT}-cluster" \
            --container "${SERVICE}-container" \
            --command "/opt/aws/bin/cfn-hup -d /cfn/hooks.d" \
            --interactive

      - name: Verify Deployment
        run: |
          HEALTH_CHECK=$(aws elbv2 describe-target-health \
            --target-group-arn "$(aws elbv2 describe-target-groups --names "${SERVICE}-tg-${ENVIRONMENT}" --query 'TargetGroups[0].TargetGroupArn' --output text)" \
            --query 'TargetHealthDescriptions[0].TargetHealth.State' \
            --output text)
          if [ "$HEALTH_CHECK" = "healthy" ]; then
            echo "✓ Deployment verified"
          else
            echo "⚠ Health check status: $HEALTH_CHECK"
          fi

      - name: Setup NAT Gateway
        run: |
          if [ "${ENVIRONMENT}" = "staging" ]; then
            aws ec2 create-internet-gateway \
              --description "Internet gateway for ${ENVIRONMENT}"

            aws ec2 attach-internet-gateway \
              --internet-gateway-id "$(aws ec2 describe-internet-gateways --filters Name=tag:Name,Values=${ENVIRONMENT}-igw --query 'InternetGateways[0].InternetGatewayId' --output text)" \
              --vpc-id "$(aws ec2 describe-vpcs --filters Name=tag:Name,Values=${ENVIRONMENT}-vpc --query 'Vpcs[0].VpcId' --output text)"

            aws ec2 create-route-table \
              --query 'RouteTables[0].RouteTableId' \
              --output text
          fi

      - name: Create RDS Database
        run: |
          if [ "${ENVIRONMENT}" = "development" ]; then
            aws rds create-db-instance \
              --db-instance-identifier "${ENVIRONMENT}-db" \
              --db-instance-class db.t3.micro \
              --engine postgres \
              --allocated-storage 20 \
              --master-username admin \
              --master-user-password "${RDS_PASSWORD}" \
              --enable-cloudwatch-logs-export ParameterGroupName postgres \
              --region "${{ env.REGION }}"
          fi

      - name: Enable CloudWatch Logs
        run: |
          aws logs create-log-group \
            --log-group-name "/ecs/${SERVICE}-${ENVIRONMENT}" \
            --region "${{ env.REGION }}"

          aws logs put-retention-policy \
            --log-group-name "/ecs/${SERVICE}-${ENVIRONMENT}" \
            --retention-in-days 7

      - name: Setup S3 for Static Assets
        run: |
          aws s3 mb s3://sales-intelligence-${ENVIRONMENT}-statics \
            --region "${{ env.REGION }}"

          aws s3 ls \
            --bucket sales-intelligence-${ENVIRONMENT}-statics

      - name: Configure IAM Permissions
        run: |
          aws iam put-role-policy \
            --role-name sales-intelligence-${ENVIRONMENT} \
            --policy-name app-deploy-policy \
            --policy-document file://app-policy.json

      - name: Enable ECR Repository Encryption
        run: |
          aws ecr set-repository-policy \
            --repository-name "${{ env.REPOSITORY_NAME }}" \
            --policy-text file://repo-policy.json

      - name: Enable Regional Public Access
        run: |
          if [ "${ENVIRONMENT}" = "production" ]; then
            aws ec2 modify-vpc-attributes \
              --vpc-id "$(aws ec2 describe-vpcs --filters Name=tag:Name,Values=${ENVIRONMENT}-vpc --query 'Vpcs[0].VpcId' --output text)" \
              --enable-network-address-management true
          fi

      - name: Generate Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
          echo "Region: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "Repository: ${{ env.ACCOUNT_ID }}/${{ env.REPOSITORY_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "Service: ${SERVICE}" >> $GITHUB_STEP_SUMMARY
          echo "Build: ${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "Service URL: ${{ vars.CLOUD_RUN_URL }}" >> $GITHUB_STEP_SUMMARY

      - name: Configure AWS Tags
        run: |
          aws ecs tag-resource \
            --resources "${SERVICE}" \
            --tags Key=Environment,Value="${ENVIRONMENT}" \
            Key=DeployedBy,GitHubActions \
            Key=BuildNumber,${GITHUB_SHA}
        continue-on-error: true
