# Cloud Run service configuration — Production
# Deploy: gcloud run services replace infra/cloud-run/production.yaml --region=us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sales-intelligence-api
  labels:
    environment: production
    app: sales-intelligence
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '2'
        autoscaling.knative.dev/maxScale: '100'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      serviceAccountName: sales-intelligence-prod@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/sales-intelligence/app:production
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: '4'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          env:
            - name: NODE_ENV
              value: production
            - name: CLOUD_RUN_URL
              value: https://sales-intelligence-api-PROJECT_ID.a.run.app
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key-production
                  key: latest
            - name: FIREBASE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: firebase-private-key-production
                  key: latest
            - name: FIREBASE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: firebase-client-email-production
                  key: latest
  traffic:
    - percent: 100
      latestRevision: true
